product_type: p18prul_ul

# Stub DSL for Pacific Life ICC18 P18PRUL Promise UL.
#
# This is a first-slice UL model that focuses on getting product-aware
# projections and illustration outputs wired up. It deliberately keeps the
# cashflow structure simple and defers detailed COI / expense / guarantee
# logic to future iterations.

meta:
  form_ids:
    - "ICC18 P18PRUL"
  source_documents:
    actuarial_memo: "docs/ICC18 P18PRUL/PALD-131619832/ICC18 P18PRUL Promise UL Actuarial Memo V3.pdf"
    premiums: "docs/ICC18 P18PRUL/PALD-131619832/ICC18 P18PRUL.pdf"
    spec_pages: "docs/ICC18 P18PRUL/PALD-131619832/SOV ICC18 P18PRUL.pdf"
  maturity_age: 121
  min_face_amount: 25000
  max_face_amount: null

  # For now we reuse a generic portfolio rate from the rate_curves
  # connector and keep premium tables out of the picture. Future slices
  # should introduce UL-specific premium/charge tables and guideline
  # premium tests.

charges:
  # Simple placeholder mortality charge using a generic 2015 VBT mortality
  # surface. This keeps the engine behaviour consistent with the existing
  # whole-life stub while we wire in richer UL logic later.
  - name: base_mortality
    description: |
      Base UL mortality charge using a generic 2015 VBT table. This is a
      placeholder; future slices should align the mortality basis with the
      ICC18 P18PRUL filing and SOV.
    formula: "face_amount * mortality_rate(age, table='2015-vbt')"

  - name: expense_charge
    description: |
      Simple percentage-of-premium loading to approximate policy expenses.
      Detailed per-policy / per-1000 loads will be wired from tables in a
      later slice.
    formula: "0.02 * premium"

credit_rates:
  - rate_type: guaranteed
    description: |
      Placeholder guaranteed crediting rate. Future slices should align
      the guaranteed rate structure with the UL contract (e.g. banded
      guarantees by duration).
    expression: "min(portfolio_rate, 0.03)"

  - rate_type: current
    description: |
      Current crediting rate as a small spread below the portfolio rate,
      used for illustration purposes only in this POC slice.
    expression: "portfolio_rate - 0.005"