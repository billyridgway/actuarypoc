apiVersion: apps/v1
kind: Deployment
metadata:
  name: dagster-dev
  namespace: illustrations-poc
  labels:
    app: dagster-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dagster-dev
  template:
    metadata:
      labels:
        app: dagster-dev
    spec:
      restartPolicy: Always
      containers:
        - name: dagster-dev
          image: python:3.11-slim
          ports:
            - containerPort: 3000
          env:
            - name: DAGSTER_HOME
              value: /app/.dagster_home
            - name: GIT_REF
              value: "feature/dagster-k8s-deploy"
            - name: PYTHONPATH
              value: /app/src
            - name: MINIO_ENDPOINT
              value: "minio.minio-system.svc.cluster.local:9000"
            - name: MINIO_ACCESS_KEY
              value: "admin"
            - name: MINIO_SECRET_KEY
              value: "password"
            - name: MINIO_BUCKET
              value: "illuminet"
            - name: MINIO_SECURE
              value: "false"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              apt-get update >/dev/null && apt-get install -y git >/dev/null
              rm -rf /app && git clone https://github.com/billyridgway/actuarypoc.git /app
              cd /app
              git checkout ${GIT_REF:-main} >/dev/null
              ls -al /app
              pip install --no-cache-dir -r requirements.txt
              mkdir -p ${DAGSTER_HOME}
              dagster dev -f dagster/repository.py -h 0.0.0.0 -p 3000
---
apiVersion: v1
kind: Service
metadata:
  name: dagster-dev
  namespace: illustrations-poc
spec:
  type: NodePort
  selector:
    app: dagster-dev
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
