apiVersion: apps/v1
kind: Deployment
metadata:
  name: projection-ui
  namespace: illustrations-poc
  labels:
    app: projection-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: projection-ui
  template:
    metadata:
      labels:
        app: projection-ui
    spec:
      restartPolicy: Always
      containers:
        - name: projection-ui
          image: ghcr.io/billyridgway/actuarypoc:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PYTHONPATH
              value: /opt/dagster/app/src
            - name: MINIO_ENDPOINT
              value: "minio.minio-system.svc.cluster.local:9000"
            - name: MINIO_ACCESS_KEY
              value: "admin"
            - name: MINIO_SECRET_KEY
              value: "password"
            - name: MINIO_BUCKET
              value: "illuminet"
            - name: MINIO_SECURE
              value: "false"
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DSN
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-key
                  key: api-key
          command: ["uvicorn"]
          args:
            - actuarypoc.ui.server:app
            - --host
            - 0.0.0.0
            - --port
            - "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: projection-ui
  namespace: illustrations-poc
spec:
  type: NodePort
  selector:
    app: projection-ui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30301
